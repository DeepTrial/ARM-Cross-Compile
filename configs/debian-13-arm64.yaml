# Debian 13.2 (Trixie) ARM64 Cross-Compilation Environment
name: debian-13-arm64
base_image: debian:trixie-slim
architecture: arm64
description: Debian 13.2 (Trixie) ARM64 cross-compilation environment

toolchain:
  type: gcc
  prefix: aarch64-linux-gnu
  packages:
    - crossbuild-essential-arm64
    - gcc-aarch64-linux-gnu
    - g++-aarch64-linux-gnu
    - libc6-dev-arm64-cross
    - linux-libc-dev-arm64-cross

packages:
  base:
    - build-essential
    - cmake
    - ninja-build
    - git
    - wget
    - curl
    - ca-certificates
    - pkg-config
  dev:
    - python3
    - python3-pip
    - python3-venv
    - gdb-multiarch
    - valgrind
  qemu:
    - qemu-user-static
    - binfmt-support
  libs:
    - libssl-dev
    - zlib1g-dev
    - libncurses-dev
    - libsqlite3-dev
  debian_tools:
    - dpkg-cross
    - fakeroot
    - devscripts

env:
  DEBIAN_FRONTEND: noninteractive
  DEBCONF_NONINTERACTIVE_SEEN: "true"
  CROSS_COMPILE: aarch64-linux-gnu-
  # Debian specific paths
  PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig

custom_steps:
  - echo "Debian 13.2 (Trixie) ARM64 environment initialized"
  - dpkg --add-architecture arm64
  - apt-get update
  - echo "Cross-compilation environment ready for Debian 13.2 ARM64"
